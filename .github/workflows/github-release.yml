name: Create Release

on:
  workflow_run:
    workflows:
      - Python CI
    types:
      - completed

jobs:
  create_release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Detect release tag
        id: detect_tag
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          TAG_NAME="$(git tag --points-at "${HEAD_SHA}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"

          if [ -z "${TAG_NAME}" ]; then
            echo "No release tag found for commit ${HEAD_SHA}. Skipping release creation."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Found release tag ${TAG_NAME} for commit ${HEAD_SHA}."
          echo "should_release=true" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag and package version
        if: steps.detect_tag.outputs.should_release == 'true'
        env:
          TAG_NAME: ${{ steps.detect_tag.outputs.tag_name }}
        run: |
          set -euo pipefail

          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION="$(python - <<'PY'
          import re
          from pathlib import Path

          content = Path("openedx_owly_apis/__init__.py").read_text(encoding="utf-8")
          match = re.search(r"^__version__ = ['\"]([^'\"]+)['\"]", content, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find package version")
          print(match.group(1))
          PY
          )"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag version ${TAG_VERSION} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Ensure tagged commit is on main
        if: steps.detect_tag.outputs.should_release == 'true'
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${HEAD_SHA}" "origin/main"; then
            echo "Tagged commit ${HEAD_SHA} is not contained in origin/main" >&2
            exit 1
          fi

      - name: Create GitHub release
        if: steps.detect_tag.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.detect_tag.outputs.tag_name }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
          make_latest: true
