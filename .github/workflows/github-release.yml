name: Create Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate tag and package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(python - <<'PY'
          import re
          from pathlib import Path

          content = Path("openedx_owly_apis/__init__.py").read_text(encoding="utf-8")
          match = re.search(r"^__version__ = ['\"]([^'\"]+)['\"]", content, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find package version")
          print(match.group(1))
          PY
          )"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag version ${TAG_VERSION} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Ensure tagged commit is on main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tagged commit ${GITHUB_SHA} is not contained in origin/main" >&2
            exit 1
          fi

      - name: Ensure Python CI passed for tagged commit
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.sha;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: "ci.yml",
                head_sha: headSha,
                event: "push",
                per_page: 100,
              }
            );

            const matchingRun = runs.find((run) => run.head_sha === headSha);
            if (!matchingRun) {
              core.setFailed(`No Python CI workflow run found for commit ${headSha}.`);
              return;
            }

            if (matchingRun.status !== "completed") {
              core.setFailed(`Python CI for commit ${headSha} is not completed yet.`);
              return;
            }

            if (matchingRun.conclusion !== "success") {
              core.setFailed(`Python CI for commit ${headSha} concluded with '${matchingRun.conclusion}'.`);
              return;
            }

            core.info(`Python CI passed for commit ${headSha}.`);

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
