name: Publish

on:
  workflow_run:
    workflows:
      - Create Release
    types:
      - completed

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Detect release tag
        id: detect_tag
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          TAG_NAME="$(git tag --points-at "${HEAD_SHA}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"

          if [ -z "${TAG_NAME}" ]; then
            echo "No release tag found for commit ${HEAD_SHA}. Skipping publish."
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Found release tag ${TAG_NAME} for commit ${HEAD_SHA}."
          echo "should_publish=true" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        if: steps.detect_tag.outputs.should_publish == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        if: steps.detect_tag.outputs.should_publish == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        if: steps.detect_tag.outputs.should_publish == 'true'
        run: python -m build

      - name: Check distributions with twine
        if: steps.detect_tag.outputs.should_publish == 'true'
        run: python -m twine check dist/*

      - name: Publish to PyPI
        if: steps.detect_tag.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
